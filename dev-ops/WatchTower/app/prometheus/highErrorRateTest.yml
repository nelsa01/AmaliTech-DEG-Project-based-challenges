rule_files:
  - alerts.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'http_requests_total{job="order-service", method="POST", route="/orders", status="200"}'
        values: '0x20'
      - series: 'http_requests_total{job="order-service", method="POST", route="/orders", status="500"}'
        values: '0+5x20'

    alert_rule_test:
      - eval_time: 4m
        alertname: HighErrorRate
        exp_alerts: []
      - eval_time: 12m
        alertname: HighErrorRate
        exp_alerts:
          - exp_labels:
              severity: warning
              job: order-service
            exp_annotations:
              summary: "High error rate on order-service"
              description: "order-service has had more than 5% 5xx responses over the last 5 minutes."